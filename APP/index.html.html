<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechCore Assistência</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top,#0f172a,#020617);
    color:white;
}

header{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:rgba(0,0,0,0.3);
}

.logo img{
    width:260px;
}

.container{
    max-width:480px;
    margin:20px auto;
    background:#1e293b;
    padding:25px;
    border-radius:18px;
}

input,select{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    background:#020617;
    color:white;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#3b82f6,#2563eb);
    color:white;
    font-weight:bold;
}

.result{
    text-align:center;
    font-size:20px;
    margin-top:10px;
    color:#22c55e;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png" alt="TechCore Assistência">
</div>
</header>

<div class="container">

<h3>Serviços</h3>

<label><input type="checkbox" value="140" data-name="Formatação sem backup"> Formatação sem backup (R$140)</label>
<label><input type="checkbox" value="190" data-name="Formatação com backup"> Formatação com backup (R$190)</label>
<label><input type="checkbox" value="680" data-name="Troca de tela"> Troca de tela (R$680)</label>
<label><input type="checkbox" value="120" data-name="Diagnóstico"> Diagnóstico (R$120)</label>

<h3>Reparo de carcaça</h3>

<select id="carcaca">
<option value="0">Nenhum</option>
<option value="490">Reparo leve (R$490)</option>
<option value="580">Reparo estrutural (R$580)</option>
<option value="avaliacao">Troca de peça (avaliação)</option>
</select>

<input id="marca" placeholder="Marca">
<input id="proc" placeholder="Processador">

<button onclick="calcular()">Gerar orçamento</button>

<div class="result" id="total">Total: R$ 0</div>

<input id="nome" placeholder="Nome">
<input id="bairro" placeholder="Bairro">
<input id="contato" placeholder="WhatsApp">
<input id="horario" placeholder="Horário">

<button onclick="enviar()">Quero fazer o serviço</button>

</div>

<script>
function calcular(){
let total=0;
document.querySelectorAll('input[type=checkbox]:checked').forEach(el=>{
total += parseInt(el.value);
});
let c=document.getElementById('carcaca').value;
if(c!="avaliacao") total+=parseInt(c);
document.getElementById('total').innerText="Total: R$ "+total;
}

function enviar(){
let marca=document.getElementById('marca').value;
let proc=document.getElementById('proc').value;
let nome=document.getElementById('nome').value;
let bairro=document.getElementById('bairro').value;
let contato=document.getElementById('contato').value;
let horario=document.getElementById('horario').value;

let servicos=[];
document.querySelectorAll('input[type=checkbox]:checked').forEach(el=>{
servicos.push(el.dataset.name+" R$"+el.value);
});

let msg=`Cliente: ${nome}
Bairro: ${bairro}
Contato: ${contato}
Horário: ${horario}

Notebook: ${marca} ${proc}

Serviços:
${servicos.join("\n")}

${document.getElementById('total').innerText}`;

window.open("https://wa.me/5549991204177?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
