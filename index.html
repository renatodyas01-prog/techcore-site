<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechCore Assistência</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;

    background:
    linear-gradient(rgba(2,6,23,0.95), rgba(2,6,23,0.95)),
    url('logo.png') center no-repeat;

    background-size: 700px;
    background-attachment: fixed;
    color:white;
}

/* TOPO */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
}

.logo-circle{
    width:80px;
    height:80px;
    border-radius:50%;
    overflow:hidden;
    border:3px solid #3b82f6;
    box-shadow:0 0 25px rgba(59,130,246,0.8);
}

.logo-circle img{
    width:100%;
    height:100%;
}

.btn{
    background:linear-gradient(90deg,#22c55e,#16a34a);
    padding:12px 18px;
    border-radius:8px;
    color:white;
    text-decoration:none;
    font-weight:bold;
}

/* CARD */
.container{
    max-width:500px;
    margin:20px auto;
    background:#1e293b;
    padding:25px;
    border-radius:18px;
}

/* CHECKBOX */
.check{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    border-radius:10px;
    background:#020617;
    margin:6px 0;
}

.check input{
    display:none;
}

.check-custom{
    width:20px;
    height:20px;
    border-radius:6px;
    border:2px solid #64748b;
}

.check input:checked + .check-custom{
    background:#3b82f6;
}

/* INPUTS */
input,select{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    background:#020617;
    color:white;
}

/* BOTÕES */
button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-weight:bold;
}

/* TOTAL */
.result{
    text-align:center;
    font-size:22px;
    margin-top:10px;
    color:#22c55e;
}

</style>
</head>

<body>

<header>
<div class="logo-circle">
<img src="logo.png">
</div>

<a class="btn" href="https://wa.me/5549991204177">WhatsApp</a>
</header>

<div class="container">

<h3>Serviços</h3>

<label class="check">
<input type="checkbox" value="140" data-name="Formatação sem backup">
<div class="check-custom"></div>
<span>Formatação sem backup (R$140)</span>
</label>

<label class="check">
<input type="checkbox" value="190" data-name="Formatação com backup">
<div class="check-custom"></div>
<span>Formatação com backup (R$190)</span>
</label>

<label class="check">
<input type="checkbox" value="680" data-name="Troca de tela">
<div class="check-custom"></div>
<span>Troca de tela (R$680)</span>
</label>

<label class="check">
<input type="checkbox" value="120" data-name="Diagnóstico">
<div class="check-custom"></div>
<span>Diagnóstico (R$120)</span>
</label>

<label class="check">
<input type="checkbox" value="490" data-name="Troca do teclado modelo embutido (interno)">
<div class="check-custom"></div>
<span>Troca do teclado modelo embutido (interno) (R$490)</span>
</label>

<label class="check">
<input type="checkbox" value="160" data-name="Limpeza interna + troca de pasta térmica">
<div class="check-custom"></div>
<span>Limpeza interna + troca de pasta térmica (R$160)</span>
</label>

<h3>Notebook</h3>
<input id="marca" placeholder="Marca">

<h3>Processador</h3>

<select id="cpuTipo" onchange="liberarGeracao()">
<option value="">Selecione o processador</option>
<option value="i3">Intel i3</option>
<option value="i5">Intel i5</option>
<option value="i7">Intel i7</option>
</select>

<select id="cpuGeracao" disabled>
<option value="">Selecione a geração</option>
<option value="2">2ª geração</option>
<option value="3">3ª geração</option>
<option value="4">4ª geração</option>
<option value="6">6ª geração</option>
<option value="7">7ª geração</option>
<option value="8">8ª geração</option>
<option value="9">9ª geração</option>
<option value="10">10ª geração</option>
<option value="11">11ª geração ou superior</option>
</select>

<p style="color:#f87171;font-size:13px">
⚠️ A informação do processador interfere diretamente no orçamento e deve estar correta
</p>

<button id="btnOrcamento" onclick="calcular()" disabled>Gerar orçamento</button>

<div class="result" id="total">Total: R$ 0</div>

<hr>

<input id="nome" placeholder="Nome">
<input id="bairro" placeholder="Bairro">
<input id="contato" placeholder="WhatsApp">
<input id="horario" placeholder="Horário">

<button onclick="enviar()">Quero fazer o serviço</button>

</div>

<script>

function liberarGeracao(){
let tipo = document.getElementById('cpuTipo').value;
if(tipo){
document.getElementById('cpuGeracao').disabled = false;
}
}

document.getElementById('cpuGeracao').addEventListener('change', function(){
if(this.value){
document.getElementById('btnOrcamento').disabled = false;
}
});

function calcular(){

let marca = document.getElementById('marca').value;
let tipo = document.getElementById('cpuTipo').value;
let geracao = parseInt(document.getElementById('cpuGeracao').value);

if(!marca || !tipo || !geracao){
alert("Preencha todos os dados");
return;
}

let total=0;

document.querySelectorAll('input[type=checkbox]:checked').forEach(el=>{
total += parseInt(el.value);
});

let valorCarcaca = 0;

if(geracao <= 6) valorCarcaca = 460;
else if(geracao <= 10) valorCarcaca = 580;
else valorCarcaca = 650;

total += valorCarcaca;

document.getElementById('total').innerText =
"Total: R$ " + total;
}

function enviar(){

let marca=document.getElementById('marca').value;
let tipo=document.getElementById('cpuTipo').value;
let geracao=document.getElementById('cpuGeracao').value;

let nome=document.getElementById('nome').value;
let bairro=document.getElementById('bairro').value;
let contato=document.getElementById('contato').value;
let horario=document.getElementById('horario').value;

let servicos=[];

document.querySelectorAll('input[type=checkbox]:checked').forEach(el=>{
servicos.push(el.dataset.name+" R$"+el.value);
});

let total = document.getElementById('total').innerText;

let msg=`Olá, quero fazer o serviço

Cliente: ${nome}
Bairro: ${bairro}
Contato: ${contato}
Horário: ${horario}

Notebook: ${marca} ${tipo} ${geracao}ª geração

Serviços:
${servicos.join("\\n")}

${total}`;

window.open("https://wa.me/5549991204177?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
