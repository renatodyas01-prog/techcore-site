<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechCore Assistência</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(rgba(2,6,23,0.95), rgba(2,6,23,0.95)), url('logo.png') center no-repeat;
    background-size:700px;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
}

.logo-circle{
    width:80px;
    height:80px;
    border-radius:50%;
    overflow:hidden;
    border:3px solid #3b82f6;
}

.logo-circle img{
    width:100%;
}

.btn{
    background:#22c55e;
    padding:10px 15px;
    border-radius:8px;
    color:white;
    text-decoration:none;
}

.container{
    max-width:500px;
    margin:20px auto;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

.check{
    display:flex;
    align-items:center;
    gap:10px;
    background:#020617;
    padding:10px;
    border-radius:8px;
    margin:5px 0;
}

.check input{
    transform:scale(1.2);
}

input,select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:none;
    background:#020617;
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    font-weight:bold;
}

.result{
    text-align:center;
    margin-top:10px;
    font-size:20px;
    color:#22c55e;
}
</style>
</head>

<body>

<header>
<div class="logo-circle">
<img src="logo.png">
</div>
<a class="btn" href="https://wa.me/5549991204177">WhatsApp</a>
</header>

<div class="container">

<h3>Serviços</h3>

<label class="check">
<input type="checkbox" value="140" data-name="Formatação sem backup">
<span>Formatação sem backup (R$140)</span>
</label>

<label class="check">
<input type="checkbox" value="190" data-name="Formatação com backup">
<span>Formatação com backup (R$190)</span>
</label>

<label class="check">
<input type="checkbox" value="680" data-name="Troca de tela">
<span>Troca de tela (R$680)</span>
</label>

<label class="check">
<input type="checkbox" value="120" data-name="Diagnóstico">
<span>Diagnóstico (R$120)</span>
</label>

<label class="check">
<input type="checkbox" value="490" data-name="Teclado embutido">
<span>Troca teclado embutido (R$490)</span>
</label>

<label class="check">
<input type="checkbox" value="160" data-name="Limpeza + pasta térmica">
<span>Limpeza + pasta térmica (R$160)</span>
</label>

<h3>Reparo de carcaça</h3>

<label class="check">
<input type="checkbox" id="carcacaCheck">
<span>Reparo de carcaça (valor automático)</span>
</label>

<h3>Notebook</h3>
<input id="marca" placeholder="Marca">

<select id="cpuTipo">
<option value="">Processador</option>
<option value="i3">Intel i3</option>
<option value="i5">Intel i5</option>
<option value="i7">Intel i7</option>
</select>

<select id="cpuGeracao">
<option value="">Geração</option>
<option value="2">2ª</option>
<option value="3">3ª</option>
<option value="4">4ª</option>
<option value="6">6ª</option>
<option value="7">7ª</option>
<option value="8">8ª</option>
<option value="9">9ª</option>
<option value="10">10ª</option>
<option value="11">11+</option>
</select>

<button onclick="calcular()">Gerar orçamento</button>

<div class="result" id="total">Total: R$ 0</div>

<hr>

<input id="nome" placeholder="Nome">
<input id="bairro" placeholder="Bairro">
<input id="contato" placeholder="WhatsApp">
<input id="horario" placeholder="Horário">

<button onclick="enviar()">Quero fazer o serviço</button>

</div>

<script>

function calcular(){

let geracao = parseInt(document.getElementById('cpuGeracao').value);

if(!geracao){
alert("Selecione a geração");
return;
}

let total = 0;

// soma serviços
document.querySelectorAll('input[type=checkbox]').forEach(el=>{
if(el.checked && el.value){
total += parseInt(el.value);
}
});

// carcaça automática
let valorCarcaca = 0;

if(document.getElementById('carcacaCheck').checked){

if(geracao <= 6) valorCarcaca = 460;
else if(geracao <= 10) valorCarcaca = 580;
else valorCarcaca = 650;

total += valorCarcaca;
}

document.getElementById('total').innerText = "Total: R$ " + total;
}

function enviar(){

let geracao = parseInt(document.getElementById('cpuGeracao').value);

let valorCarcaca = 0;

if(geracao <= 6) valorCarcaca = 460;
else if(geracao <= 10) valorCarcaca = 580;
else valorCarcaca = 650;

let servicos=[];

document.querySelectorAll('input[type=checkbox]').forEach(el=>{
if(el.checked && el.dataset.name){
servicos.push(el.dataset.name+" R$"+el.value);
}
});

if(document.getElementById('carcacaCheck').checked){
servicos.push("Reparo de carcaça R$"+valorCarcaca);
}

let msg=`Olá, quero fazer o serviço

Serviços:
${servicos.join("\\n")}

${document.getElementById('total').innerText}`;

window.open("https://wa.me/5549991204177?text="+encodeURIComponent(msg));

}

</script>

</body>
</html>
